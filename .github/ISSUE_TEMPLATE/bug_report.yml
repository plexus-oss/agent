name: Bug Report
description: Report a bug in plexus-agent
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: agent-version
    attributes:
      label: Agent Version
      description: Output of `plexus --version` or version in pyproject.toml
      placeholder: "0.9.6"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python3 --version`
      placeholder: "3.11.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What device/OS are you running on?
      options:
        - Raspberry Pi (Raspbian/Debian)
        - Ubuntu/Debian (x86)
        - macOS
        - Windows
        - Other Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Minimal code or CLI commands to reproduce the issue
      render: python
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Installed Extras
      description: Which optional extras are installed? (e.g., sensors, can, mavlink, camera)
      placeholder: "pip install plexus-agent[sensors,can]"

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Any relevant error output
      render: text
